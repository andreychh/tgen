name: stands
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  stands:
    strategy:
      fail-fast: false
      matrix:
        target:
          - go
          - python
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
        with:
          version: v2026.5.16
      - run: task stands:ci:${{ matrix.target }}
