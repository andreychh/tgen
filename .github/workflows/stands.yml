name: stands
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  stands:
    strategy:
      fail-fast: false
      matrix:
        target:
          - go
          - python
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
        with:
          version: v2026.6.10
      - run: task stands:ci:${{ matrix.target }}
