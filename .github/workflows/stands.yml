name: stands
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  stands:
    strategy:
      fail-fast: false
      matrix:
        target:
          - go
          - python
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
        with:
          version: v2026.5.7
      - run: task stands:ci:${{ matrix.target }}
