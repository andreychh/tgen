name: lint
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        task:
          - go
          - md
          - yml
          - toml
          - gha
          - renovate
          - reuse
          - typos
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          version: v2026.7.0
      - run: task lint:${{ matrix.task }}
