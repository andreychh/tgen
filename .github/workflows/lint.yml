name: lint
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        task:
          - go
          - md
          - yml
          - toml
          - gha
          - reuse
          - typos
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d  # v3.6.2
        with:
          version: v2026.3.1
      - run: task lint:${{ matrix.task }}
