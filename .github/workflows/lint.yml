name: lint
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        task:
          - go
          - md
          - yml
          - toml
          - gha
          - renovate
          - reuse
          - typos
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
        with:
          version: v2026.6.10
      - run: task lint:${{ matrix.task }}
