name: lint
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        task:
          - go
          - md
          - yml
          - toml
          - gha
          - reuse
          - typos
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - uses: jdx/mise-action@665d82088236dd987b2af6165be29d21e2e11184  # v3.0.0
        with:
          version: v2026.3.1
      - run: task lint:${{ matrix.task }}
