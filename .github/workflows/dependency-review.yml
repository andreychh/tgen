name: dependency-review
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  dependency-review:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
