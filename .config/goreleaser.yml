# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# yamllint disable rule:empty-lines
version: 2

before:
  hooks:
    - go mod tidy

gomod:
  proxy: true

report_sizes: true

metadata:
  mod_timestamp: '{{ .CommitTimestamp }}'

builds:
  - main: .
    binary: tgen
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/andreychh/tgen/meta.version={{.Version}}
      - -X github.com/andreychh/tgen/meta.commit={{.FullCommit}}
      - -X github.com/andreychh/tgen/meta.date={{.CommitDate}}
      - -X github.com/andreychh/tgen/meta.treeState={{.IsGitDirty}}
      - -X github.com/andreychh/tgen/meta.builder=goreleaser

archives:
  - formats: [ tar.gz ]
    name_template: >-
      {{- .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}
    format_overrides:
      - goos: windows
        formats: [ zip ]
    files:
      - README.md
      - LICENSES

checksum:
  name_template: 'checksums.txt'

changelog:
  use: github
  format: '{{ .SHA }}: {{ .Message }}{{ if .Logins }} ({{ .Logins | englishJoin }}){{ end }}'
  filters:
    exclude:
      - '^test'
      - '^chore'
      - '^refactor'
      - '^ci'
      - '^Merge'
  groups:
    - title: 'New Features'
      regexp: '^feat'
      order: 100
    - title: 'Bug fixes'
      regexp: '^fix'
      order: 200
    - title: 'Documentation updates'
      regexp: '^docs'
      order: 400
    - title: Other work
      order: 9999

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
