# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
#
# Disable reasons:
#   [deprecated]      - outdated, has a replacement
#   [duplicate]       - covered by another linter
#   [not applicable]  - technology/library not used in this project
#   [too strict]      - too aggressive for this project
#   [style]           - matter of taste, not critical
#   [unstable]        - disabled until the architecture stabilizes
version: '2'
linters:
  default: none
  enable:
    # - arangolint [not applicable] # Opinionated best practices for arangodb client.
    - asasalint  # Check for pass []any as any in variadic func(...any).
    - asciicheck  # Checks that all code identifiers does not have non-ASCII symbols in the name.
    - bidichk  # Checks for dangerous unicode character sequences.
    - bodyclose  # Checks whether HTTP response body is closed successfully.
    - canonicalheader  # Canonicalheader checks whether net/http.Header uses canonical header.
    - containedctx  # Containedctx is a linter that detects struct contained context.Context field.
    - contextcheck  # Check whether the function uses a non-inherited context.
    # - copyloopvar [duplicate go1.22] # A linter detects places where loop variables are copied.
    # - cyclop [duplicate gocyclo] # Checks function and package cyclomatic complexity.
    # - decorder [too strict] # Check declaration order and count of types, constants, variables and functions.
    # - depguard [not applicable] # Go linter that checks if package imports are in a list of acceptable packages.
    - dogsled  # Checks assignments with too many blank identifiers (e.g. x, _, _, _, := f()).
    - dupl  # Detects duplicate fragments of code.
    - dupword  # Checks for duplicate words in the source code.
    - durationcheck  # Check for two durations multiplied together.
    - embeddedstructfieldcheck  # Embedded types should be at the top of the field list of a struct, and there must be an empty line separating embedded fields from regular fields.
    # - err113 [too strict] # Check errors handling expressions.
    - errcheck  # Errcheck is a program for checking for unchecked errors in Go code. These unchecked errors can be critical bugs in some cases.
    - errchkjson  # Checks types passed to the json encoding functions. Reports unsupported types and reports occurrences where the check for the returned error can be omitted.
    - errname  # Checks that sentinel errors are prefixed with the Err and error types are suffixed with the Error.
    - errorlint  # Find code that can cause problems with the error wrapping scheme introduced in Go 1.13.
    - exhaustive  # Check exhaustiveness of enum switch statements.
    - exhaustruct  # Checks if all structure fields are initialized.
    - exptostd  # Detects functions from golang.org/x/exp/ that can be replaced by std functions.
    - fatcontext  # Detects nested contexts in loops and function literals.
    - forbidigo  # Forbids identifiers.
    - forcetypeassert  # Find forced type assertions.
    - funcorder  # Checks the order of functions, methods, and constructors.
    - funlen  # Checks for long functions.
    # - ginkgolinter [not applicable] # Enforces standards of using ginkgo and gomega.
    - gocheckcompilerdirectives  # Checks that go compiler directive comments (//go:) are valid.
    - gochecknoglobals  # Check that no global variables exist.
    - gochecknoinits  # Checks that no init functions are present in Go code.
    - gochecksumtype  # Run exhaustiveness checks on Go "sum types".
    - gocognit  # Computes and checks the cognitive complexity of functions.
    - goconst  # Finds repeated strings that could be replaced by a constant.
    - gocritic  # Provides diagnostics that check for bugs, performance and style issues.
    - gocyclo  # Computes and checks the cyclomatic complexity of functions.
    # - godoclint [unstable] # Checks Golang's documentation practice (godoc). TODO #54: re-enable when architecture stabilizes
    - godot  # Check if comments end in a period.
    # - godox [style] # Detects usage of FIXME and other keywords inside comments.
    # - goheader [duplicate reuse] # Check if file header matches to pattern.
    - gomoddirectives  # Manage the use of 'replace', 'retract', and 'excludes' directives in go.mod.
    # - gomodguard [not applicable] # Allow and blocklist linter for direct Go module dependencies. This is different from depguard where there are different block types for example version constraints and module recommendations.
    - goprintffuncname  # Checks that printf-like functions are named with f at the end.
    - gosec  # Inspects source code for security problems.
    # - gosmopolitan [not applicable] # Report certain i18n/l10n anti-patterns in your Go codebase.
    - govet  # Vet examines Go source code and reports suspicious constructs. It is roughly the same as 'go vet' and uses its passes.
    - grouper  # Analyze expression groups.
    - iface  # Detect the incorrect use of interfaces, helping developers avoid interface pollution.
    - importas  # Enforces consistent import aliases.
    - inamedparam  # Reports interfaces with unnamed method parameters.
    - ineffassign  # Detects when assignments to existing variables are not used.
    - interfacebloat  # A linter that checks the number of methods inside an interface.
    - intrange  # Intrange is a linter to find places where for loops could make use of an integer range.
    - iotamixing  # Checks if iotas are being used in const blocks with other non-iota declarations.
    # - ireturn [too strict] # Accept Interfaces, Return Concrete Types.
    # - lll [duplicate golines] # Reports long lines.
    - loggercheck  # Checks key value pairs for common logger libraries (kitlog,klog,logr,slog,zap).
    - maintidx  # Maintidx measures the maintainability index of each function.
    - makezero  # Find slice declarations with non-zero initial length.
    - mirror  # Reports wrong mirror patterns of bytes/strings usage.
    # - misspell [duplicate typos] # Finds commonly misspelled English words.
    # - mnd [too strict] # An analyzer to detect magic numbers.
    - modernize  # A suite of analyzers that suggest simplifications to Go code, using modern language and library features.
    - musttag  # Enforce field tags in (un)marshaled structs.
    # - nakedret [style] # Checks that functions with naked returns are not longer than a maximum size (can be zero).
    - nestif  # Reports deeply nested if statements.
    - nilerr  # Find the code that returns nil even if it checks that the error is not nil.
    - nilnesserr  # Reports constructs that checks for err != nil, but returns a different nil value error.
    - nilnil  # Checks that there is no simultaneous return of nil error and an invalid value.
    # - nlreturn [style] # Checks for a new line before return and branch statements to increase code clarity.
    - noctx  # Detects function and method with missing usage of context.Context.
    - noinlineerr  # Disallows inline error handling (if err := ...; err != nil {).
    - nolintlint  # Reports ill-formed or insufficient nolint directives.
    - nonamedreturns  # Reports all named returns.
    - nosprintfhostport  # Checks for misuse of Sprintf to construct a host with port in a URL.
    # - paralleltest [duplicate tparallel] # Detects missing usage of t.Parallel() method in your Go test.
    - perfsprint  # Checks that fmt.Sprintf can be replaced with a faster alternative.
    - prealloc  # Find slice declarations that could potentially be pre-allocated.
    # - predeclared [too strict] # Find code that shadows one of Go's predeclared identifiers.
    # - promlinter [not applicable] # Check Prometheus metrics naming via promlint.
    # - protogetter [not applicable] # Reports direct reads from proto message fields when getters should be used.
    - reassign  # Checks that package variables are not reassigned.
    - recvcheck  # Checks for receiver type consistency.
    # - revive [style] # Fast, configurable, extensible, flexible, and beautiful linter for Go. Drop-in replacement of golint.
    # - rowserrcheck [not applicable] # Checks whether Rows.Err of rows is checked successfully.
    - sloglint  # Ensure consistent code style when using log/slog.
    # - spancheck [not applicable] # Checks for mistakes with OpenTelemetry/Census spans.
    # - sqlclosecheck [not applicable] # Checks that sql.Rows, sql.Stmt, sqlx.NamedStmt, pgx.Query are closed.
    - staticcheck  # It's the set of rules from staticcheck.
    - tagalign  # Check that struct tags are well aligned.
    - tagliatelle  # Checks the struct tags.
    - testableexamples  # Linter checks if examples are testable (have an expected output).
    - testifylint  # Checks usage of github.com/stretchr/testify.
    - testpackage  # Linter that makes you use a separate _test package.
    - thelper  # Thelper detects tests helpers which do not start with the t.Helper() method.
    - tparallel  # Tparallel detects inappropriate usage of t.Parallel() method in your Go test codes.
    - unconvert  # Remove unnecessary type conversions.
    - unparam  # Reports unused function parameters.
    # - unqueryvet [not applicable] # Detects SELECT * in SQL queries and SQL builders, preventing performance issues and encouraging explicit column selection.
    - unused  # Checks Go code for unused constants, variables, functions and types.
    - usestdlibvars  # A linter that detect the possibility to use variables/constants from the Go standard library.
    - usetesting  # Reports uses of functions with replacement inside the testing package.
    - varnamelen  # Checks that the length of a variable's name matches its scope.
    - wastedassign  # Finds wasted assignment statements.
    # - whitespace [style] # Whitespace is a linter that checks for unnecessary newlines at the start and end of functions, if, for, etc.
    # - wrapcheck [too strict] # Checks that errors returned from external packages are wrapped.
    # - wsl [deprecated wsl_v5] # New major version. Use wsl_v5 instead.
    # - wsl_v5 [style] # Add or remove empty lines.
    # - zerologlint [not applicable] # Detects the wrong usage of zerolog that a user forgets to dispatch with Send or Msg.
  settings:
    embeddedstructfieldcheck:
      forbid-mutex: true
    gocognit:
      min-complexity: 15
    gocyclo:
      min-complexity: 15
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocritic:
      enable-all: true
      disabled-checks:
        - builtinShadow
    godoclint:
      default: all
    nolintlint:
      require-specific: true
    exhaustruct:
      exclude:
        - '^github\.com/spf13/cobra\..*$'
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - exhaustruct
          - funlen
          - godoclint
          - gosec
          - varnamelen
formatters:
  enable:
    - gofumpt
    - golines
  settings:
    gofumpt:
      extra-rules: true
run:
  relative-path-mode: gitroot
