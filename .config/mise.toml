# yaml-language-server: $schema=https://mise.jdx.dev/schema/mise.json

[settings]
always_keep_download = false
legacy_version_file = false

[tools]
"go" = "1.26.4"
"github:caarlos0/svu" = "3.4.1"
"github:crate-ci/typos" = "1.47.2"
"github:golangci/golangci-lint" = "2.12.2"
"github:goreleaser/goreleaser" = "2.16.0"
"github:go-task/task" = "3.51.1"
"github:rhysd/actionlint" = "1.7.12"
"github:tamasfe/taplo" = "0.10.0"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.1.4"
"npm:markdownlint-cli2" = "0.22.1"
"npm:renovate" = "43.233.3"
"pipx:reuse" = "6.2.0"
"pipx:yamllint" = "1.38.0"

# indirect
"node" = "24.14.0"
"github:koalaman/shellcheck" = "0.11.0"

[env]
_.file = ".env"
GOROOT = ""
