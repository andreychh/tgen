# yaml-language-server: $schema=https://mise.jdx.dev/schema/mise.json

[tools]
"go" = "1.22.0"

[env]
GOROOT = ""

[tasks.check]
description = "Verify the generated Go code compiles"
dir = "api"
run = "go build ./..."

[tasks.test]
description = "Run tests for the generated Go stand"
dir = "api"
run = "go test -race ./..."
