# yaml-language-server: $schema=https://mise.jdx.dev/schema/mise.json

[tools]
"python" = "3.13.3"
"github:astral-sh/uv" = "0.11.21"

[tasks.setup]
description = "Create venv and install dependencies"
run = "uv sync --python $(mise which python)"

[tasks.check]
description = "Verify the generated Python code passes type checking"
depends = ["setup"]
run = "uv run mypy api/"

[tasks.test]
description = "Run behavioral tests for the generated stand"
depends = ["setup"]
run = "uv run pytest"
